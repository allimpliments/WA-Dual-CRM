<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WhatsApp CRM</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow" style="max-width: 400px; width:100%">
      <h3 class="text-center mb-3"><i class="fab fa-whatsapp text-success"></i> WhatsApp CRM</h3>
      <div id="loginForm">
        <div class="mb-3">
          <input type="email" id="loginEmail" class="form-control" placeholder="Email" required>
        </div>
        <div class="mb-3">
          <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
        </div>
        <button id="loginBtn" class="btn btn-dark w-100">Login</button>
        <p class="mt-2 text-center"><small>No account? <a href="#" id="showRegister">Register</a></small></p>
      </div>
      <div id="registerForm" style="display:none">
        <div class="mb-3">
          <input type="text" id="regName" class="form-control" placeholder="Full Name" required>
        </div>
        <div class="mb-3">
          <input type="email" id="regEmail" class="form-control" placeholder="Email" required>
        </div>
        <div class="mb-3">
          <input type="password" id="regPassword" class="form-control" placeholder="Password (min 6 chars)" required>
        </div>
        <button id="registerBtn" class="btn btn-success w-100">Register</button>
        <p class="mt-2 text-center"><small>Already have account? <a href="#" id="showLogin">Login</a></small></p>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appMain" style="display:none">
    <!-- SIDEBAR (desktop) -->
    <aside class="sidebar" id="sidebar">
      <div class="brand"><i class="fab fa-whatsapp text-success fs-3"></i> Panel</div>
      <!-- Nav injected by app.js -->
    </aside>
    <!-- MAIN AREA -->
    <div class="main-area">
      <div class="topbar">
        <div>
          <i class="fas fa-bars d-md-none me-2" id="menuToggle" style="cursor:pointer;"></i>
          <strong id="currentSectionTitle">Dashboard</strong>
        </div>
        <div>
          <span class="badge bg-success" id="waStatus">WhatsApp Connected</span>
          <i class="fas fa-user-circle ms-2 fs-5"></i>
        </div>
      </div>
      <div id="contentArea">
        <!-- Dynamic content loaded here -->
      </div>
    </div>
  </div>

  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Our scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/leads.js"></script>
  <script src="js/contacts.js"></script>
  <!-- Additional scripts will be added later -->
</body>
</html>
