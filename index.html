<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>11 Avatar Digital Hub CRM</title>
  <meta name="description" content="AI Powered WhatsApp CRM Platform — Manage Leads, Campaigns, Chats, Automation & More">
  <meta name="theme-color" content="#6366f1">
  <link rel="manifest" href="manifest.json">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
    
    .app-loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; width: 100%; background: #f8fafc;
      position: fixed; top: 0; left: 0; z-index: 99999;
    }
    .app-loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="app-loading" id="appLoading">
    <div class="spinner"></div>
  </div>

  <!-- MAIN APP -->
  <div id="appMain" style="display:none;">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><i class="fab fa-whatsapp text-success fs-3"></i> Panel</div>
    </aside>
    <div class="main-area">
      <div class="topbar">
        <div>
          <i class="fas fa-bars d-md-none me-2" id="menuToggle" style="cursor:pointer;"></i>
          <strong id="currentSectionTitle">Dashboard</strong>
        </div>
        <div>
          <span class="badge bg-success">WhatsApp Connected</span>
          <i class="fas fa-user-circle ms-2 fs-5"></i>
          <small id="userRoleBadge" class="ms-1 text-muted"></small>
        </div>
      </div>
      <div id="contentArea"></div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/leads.js"></script>
  <script src="js/leadCapture.js"></script>
  <script src="js/contacts.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/campaigns.js"></script>
  <script src="js/chats.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/flows.js"></script>
  <script src="js/social.js"></script>
  <script src="js/marketing.js"></script>
  <script src="js/social/composer.js"></script>
  <script src="js/kanban.js"></script>
  <script src="js/ecommerce.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/integrations.js"></script>
  <script src="js/setup.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/clients.js"></script>
  <script src="js/tickets.js"></script>
  <script src="js/appointments.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/knowledge.js"></script>
  <script src="js/plan.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/admin.js"></script>
  
  <script>
    // Hide loader when app is ready or redirect to home if not logged in
    setTimeout(() => {
      const loader = document.getElementById('appLoading');
      if (loader) { loader.style.opacity = '0'; loader.style.transition = '0.3s'; setTimeout(() => loader.remove(), 300); }
    }, 4000);
  </script>
</body>
</html>
